<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if page.title %}{{ page.title }} | {% endif %}Peipei Zhao</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f9fa;
      color: #222;
    }

    .site-header {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-title a {
      text-decoration: none;
      color: #222;
      font-size: 26px;
      font-weight: bold;
    }

    .site-nav a {
      text-decoration: none;
      color: #222;
      margin-left: 24px;
      font-size: 16px;
    }

    .site-nav a:hover {
      color: #0d6efd;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .site-footer {
      text-align: center;
      color: #666;
      font-size: 14px;
      padding: 24px 0 40px;
    }

    .jumbotron h2, .jumbotron h3 {
      margin-top: 0;
    }

    .jumbotron p, .jumbotron li {
      line-height: 1.8;
      font-size: 17px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-title">
      <a href=" ">Peipei Zhao</a >
    </div>

    <nav class="site-nav">
      <a href="{{ site.baseurl }}/">Home</a >
      <a href="{{ site.baseurl }}/research.html">About</a >
      <a href="{{ site.baseurl }}/publications.html">Projects</a >
      <a href="{{ site.baseurl }}/people.html">Contact</a >
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© Peipei Zhao | Personal Academic Website</p >
  </footer>

</body>
</html>
